---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: gitea
  namespace: gitea-staging
  annotations:
    description: "Gitea container image stream (references production to avoid rate limits)"
spec:
  lookupPolicy:
    # Allow pods in this namespace to reference this image stream by name
    local: true
  tags:
    # Reference production's stable-rootless tag instead of pulling from Docker Hub
    # This avoids Docker Hub rate limits by reusing production's cached image
    - name: "latest-rootless"
      annotations:
        openshift.io/display-name: "Gitea Stable Rootless (from production)"
        description: "References production's stable Gitea image to avoid Docker Hub rate limits"
      from:
        kind: ImageStreamTag
        name: gitea:stable-rootless
        namespace: gitea
      importPolicy:
        importMode: Legacy
      referencePolicy:
        type: Local
