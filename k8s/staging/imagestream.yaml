---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: gitea
  namespace: gitea-staging
  annotations:
    description: "Gitea container image stream with automatic updates (latest version)"
spec:
  lookupPolicy:
    # Allow pods in this namespace to reference this image stream by name
    local: true
  tags:
    # Track the latest rootless releases
    # Note: Tag is "latest-rootless" to match what Helm chart generates (tag "latest" + rootless: true)
    - name: "latest-rootless"
      annotations:
        openshift.io/display-name: "Gitea Latest Rootless"
        description: "Latest Gitea rootless release"
      from:
        kind: DockerImage
        name: docker.io/gitea/gitea:latest-rootless
      importPolicy:
        # Automatically import new images on schedule (checks every ~15 minutes)
        scheduled: true
        importMode: Legacy
      referencePolicy:
        type: Source
