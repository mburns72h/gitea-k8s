---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: gitea
  namespace: gitea
  annotations:
    description: "Gitea container image stream with automatic updates"
spec:
  lookupPolicy:
    # Allow pods in this namespace to reference this image stream by name
    local: true
  tags:
    # Track stable (1.25.x) rootless releases
    # Note: Tag is "stable-rootless" to match what Helm chart generates (tag "stable" + rootless: true)
    - name: "stable-rootless"
      annotations:
        openshift.io/display-name: "Gitea Stable Rootless"
        description: "Gitea stable (1.25.x) rootless releases"
      from:
        kind: DockerImage
        name: docker.io/gitea/gitea:1.25-rootless
      importPolicy:
        # Automatically import new images on schedule (checks every ~15 minutes)
        scheduled: true
        importMode: Legacy
      referencePolicy:
        type: Source

    # Track latest rootless releases (for staging)
    - name: "latest-rootless"
      annotations:
        openshift.io/display-name: "Gitea Latest Rootless"
        description: "Latest Gitea rootless release"
      from:
        kind: DockerImage
        name: docker.io/gitea/gitea:latest-rootless
      importPolicy:
        scheduled: true
        importMode: Legacy
      referencePolicy:
        type: Source
