# Gitea on Kubernetes via official Helm chart
# Chart: gitea-charts/gitea
# This values.yaml mirrors your current compose/app.ini and enables an in-cluster PostgreSQL.
#
# Notes:
# - Most runtime settings can be read from your restored /data (app.ini). We still set critical
#   items here (DB endpoints, ROOT_URL, SSH) to ensure correct operation even before restore.
# - Secrets are copied from your current app.ini for a seamless migration. Rotate later as desired.
#
# Namespace is set at install time via: -n gitea

image:
  registry: docker.io
  repository: gitea/gitea
  tag: "1.22"
  pullPolicy: IfNotPresent
  rootless: false

service:
  http:
    type: ClusterIP
    port: 3000
  ssh:
    enabled: true
    type: NodePort
    port: 22
    nodePort: 32222

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: gitea.home.mburnsfire.net
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # To enable TLS, set e.g.:
  # tls:
  #   - secretName: gitea-tls
  #     hosts:
  #       - gitea.home.mburnsfire.net
  # Note: Disabled for OpenShift. We use an OpenShift Route instead (see k8s/gitea/route.yaml).

# OpenShift-friendly security context overrides:
# Avoid forcing fixed UIDs/GIDs so SCC 'restricted' can assign a random UID.
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
  fsGroup: null
  runAsUser: null
  runAsGroup: null
containerSecurityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: null
  runAsGroup: null
  capabilities:
    drop:
      - ALL
initContainerSecurityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: null
  runAsGroup: null
  capabilities:
    drop:
      - ALL

persistence:
  enabled: true
  # Reuse existing NFS path via static PVC
  existingClaim: gitea-shared-storage
  accessModes:
    - ReadWriteMany
  size: 50Gi
  mountPath: /data
  # On OpenShift+NFS (root-squash), disable default chown/chmod init logic
  defaultPermissions: false

# Override init-directories to skip chown (fails on OpenShift restricted SCC + NFS)
initPreScript: |
  #!/bin/sh
  echo "Skipping chown on /data (NFS + OpenShift restricted SCC)"
  exit 0

gitea:
  # Apply minimal config here; your restored /data/gitea/conf/app.ini will be honored.
  # OpenShift: clear fixed UIDs/GIDs so SCC can assign a random UID
  
  # Skip configure-gitea init entirely (DB already restored and working)
  # Disable admin creation (we have existing data)
  admin:
    existingSecret: ""
  
  statefulset:
    env: []
  
  livenessProbe:
    enabled: true
    initialDelaySeconds: 200
    periodSeconds: 10
    timeoutSeconds: 1
    successThreshold: 1
    failureThreshold: 10
  readinessProbe:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 1
    successThreshold: 1
    failureThreshold: 3
  
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
    fsGroup: null
    runAsUser: null
    runAsGroup: null
  containerSecurityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: null
    runAsGroup: null
    capabilities:
      drop:
        - ALL
  securityContext: {}
  initContainerSecurityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: null
    runAsGroup: null
    capabilities:
      drop:
        - ALL
  config:
    DEFAULT:
      RUN_USER: git
      RUN_MODE: prod
    server:
      DISABLE_SSH: false
      SSH_DOMAIN: gitea-ssh.home.mburnsfire.net
      SSH_PORT: 22
      SSH_LISTEN_PORT: 22
      ROOT_URL: https://gitea.home.mburnsfire.net/
    # Optional: mirror common service/mail settings from app.ini
    service:
      DISABLE_REGISTRATION: false
    mailer:
      ENABLED: true
      SMTP_ADDR: shift.home.mburnsfire.net
      SMTP_PORT: 25
      PROTOCOL: smtp
      FROM: "Gitea <mburns72h+gitea@gmail.com>"
    security:
      INSTALL_LOCK: true
      # SECRET_KEY is sourced from a Kubernetes Secret at runtime if provided.
    lfs:
      PATH: /data/git/lfs

  # Ensure DB points to the in-cluster PostgreSQL service, overriding any restored app.ini DB host.
  env:
    - name: GITEA__database__DB_TYPE
      value: postgres
    - name: GITEA__database__HOST
      value: gitea-postgresql-ha-pgpool:5432
    - name: GITEA__database__NAME
      value: gitea
    - name: GITEA__database__USER
      valueFrom:
        secretKeyRef:
          name: gitea-db-app
          key: username
    - name: GITEA__database__PASSWD
      valueFrom:
        secretKeyRef:
          name: gitea-db-app
          key: password
    - name: GITEA__security__INTERNAL_TOKEN
      valueFrom:
        secretKeyRef:
          name: gitea-secrets
          key: internal_token
    - name: GITEA__security__SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: gitea-secrets
          key: secret_key
          optional: true
    - name: GITEA__lfs__JWT_SECRET
      valueFrom:
        secretKeyRef:
          name: gitea-secrets
          key: lfs_jwt_secret
    - name: GITEA__oauth2__JWT_SECRET
      valueFrom:
        secretKeyRef:
          name: gitea-secrets
          key: oauth2_jwt_secret
    - name: ROOT_URL
      value: https://gitea.home.mburnsfire.net
    # Attempt to avoid chown/chmod on NFS (init scripts honor these in recent images)
    - name: SKIP_CHOWN
      value: "true"
    - name: SKIP_CHMOD
      value: "true"
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 1Gi

# Disable single PostgreSQL
postgresql:
  enabled: false

# Use HA PostgreSQL (but don't reuse existing DB - start fresh)
postgresql-ha:
  enabled: true
  postgresql:
    replicaCount: 3
    podAntiAffinityPreset: hard
    podSecurityContext:
      enabled: false
    containerSecurityContext:
      enabled: false
    username: giteauser
    database: gitea
    persistence:
      enabled: true
      size: 20Gi
      # Let it create new PVCs; we'll restore data after
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: "2"
        memory: 4Gi
    existingSecret: gitea-pg-ha-secrets
    # Disable volumePermissions (fails on OpenShift restricted SCC)
    volumePermissions:
      enabled: false
  pgpool:
    replicaCount: 2
    podAntiAffinityPreset: hard
    podSecurityContext:
      enabled: false
    containerSecurityContext:
      enabled: false
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1
        memory: 1Gi
    existingSecret: gitea-pg-ha-secrets
    customUsersSecret: gitea-pgpool-custom-users


