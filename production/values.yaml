# Gitea HA Production Deployment on OpenShift
# Clean installation with 3 replicas, PostgreSQL HA, and Redis
# Chart: gitea-charts/gitea (official Helm chart)
# Namespace: gitea-prod

# Allow non-standard images (imagestreams)
global:
  security:
    allowInsecureImages: true
  # Use nfs-default storage class to avoid Synology CSI permission issues
  storageClass: "nfs-default"

# Gitea image configuration
# Using OpenShift ImageStream - cached image from old cluster
# Image tag is already rootless, don't append -rootless suffix
image:
  registry: image-registry.openshift-image-registry.svc:5000
  repository: gitea/gitea
  tag: "stable-rootless"
  pullPolicy: IfNotPresent
  rootless: false

# Enable HA with 3 replicas
replicaCount: 3

# Use RollingUpdate strategy for zero-downtime updates
strategy:
  type: "RollingUpdate"

# Service configuration
service:
  http:
    type: ClusterIP
    port: 3000
  ssh:
    enabled: true
    type: NodePort
    port: 2222
    nodePort: 32222

# Disable default ingress (using OpenShift Route instead)
ingress:
  enabled: false

# OpenShift-friendly security context overrides
# Avoid forcing fixed UIDs/GIDs so SCC 'restricted' can assign a random UID
podSecurityContext:
  runAsNonRoot: true

containerSecurityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: null
  runAsGroup: null
  capabilities:
    drop:
      - ALL

initContainerSecurityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: null
  runAsGroup: null
  capabilities:
    drop:
      - ALL

# Persistence configuration - using OpenShift dynamic storage
persistence:
  enabled: true
  # Let OpenShift create a PVC dynamically
  # Gitea requires RWX (ReadWriteMany) for multi-replica deployments
  accessModes:
    - ReadWriteMany
  size: 50Gi
  # Specify your OpenShift storage class that supports RWX
  # Use nfs-default to avoid Synology CSI permission issues
  storageClass: "nfs-default"
  mountPath: /data

# Gitea application configuration
gitea:
  # Admin user will be created on first startup
  admin:
    username: "gitea_admin"
    email: "mburns72h+gitea@gmail.com"
    # Password will be auto-generated on first startup if not set
    # Check pod logs for the generated password
    existingSecret: ""

  # Skip chown/chmod init (fails on NFS)
  initPreScript: |
    #!/bin/sh
    echo "Skipping chown on /data (NFS doesn't support it)"
    # Create directories without chown
    mkdir -p /data/git/.ssh || true
    chmod 700 /data/git/.ssh || true
    mkdir -p /data/gitea/conf || true
    mkdir -p "${GITEA_TEMP}" || true
    chmod ug+rwx "${GITEA_TEMP}" || true
    exit 0

  # Pod anti-affinity to spread replicas across nodes
  podAnnotations: {}

  livenessProbe:
    enabled: true
    initialDelaySeconds: 200
    periodSeconds: 10
    timeoutSeconds: 1
    successThreshold: 1
    failureThreshold: 10

  readinessProbe:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 1
    successThreshold: 1
    failureThreshold: 3

  # Gitea configuration (app.ini)
  config:
    APP_NAME: "Gitea: Git with a cup of tea"
    RUN_MODE: prod
    # RUN_USER: git  # Removed to bypass user check with OpenShift random UIDs

    server:
      DISABLE_SSH: false
      SSH_DOMAIN: gitea-ssh.home.mburnsfire.net
      SSH_PORT: 2222
      SSH_LISTEN_PORT: 2222
      ROOT_URL: https://gitea.home.mburnsfire.net/
      LFS_START_SERVER: true
      OFFLINE_MODE: false

    database:
      DB_TYPE: postgres
      # Will be overridden by environment variables below

    session:
      # Use Redis for sessions (required for HA)
      PROVIDER: redis
      PROVIDER_CONFIG: redis://:REDIS_PASSWORD@gitea-redis-master:6379/0?pool_size=100&idle_timeout=180s
      # Session settings for HA
      COOKIE_SECURE: true
      COOKIE_NAME: gitea_session

    cache:
      # Use Redis for cache (required for HA)
      ENABLED: true
      ADAPTER: redis
      HOST: redis://:REDIS_PASSWORD@gitea-redis-master:6379/1?pool_size=100&idle_timeout=180s

    queue:
      # Use Redis for queues (recommended for HA)
      TYPE: redis
      CONN_STR: redis://:REDIS_PASSWORD@gitea-redis-master:6379/2?pool_size=100&idle_timeout=180s

    security:
      INSTALL_LOCK: true
      REVERSE_PROXY_LIMIT: 1
      REVERSE_PROXY_TRUSTED_PROXIES: "*"
      PASSWORD_HASH_ALGO: pbkdf2

    service:
      DISABLE_REGISTRATION: false
      REQUIRE_SIGNIN_VIEW: false
      REGISTER_EMAIL_CONFIRM: false
      ENABLE_NOTIFY_MAIL: true
      DEFAULT_KEEP_EMAIL_PRIVATE: false
      DEFAULT_ALLOW_CREATE_ORGANIZATION: true
      DEFAULT_ENABLE_TIMETRACKING: true

    mailer:
      ENABLED: true
      # Use internal OpenShift SMTP relay service
      SMTP_ADDR: smtp-relay.smtp-relay.svc.cluster.local
      SMTP_PORT: 25
      PROTOCOL: smtp
      FROM: "Gitea <mburns72h+gitea@gmail.com>"

    openid:
      ENABLE_OPENID_SIGNIN: false
      ENABLE_OPENID_SIGNUP: false

    migrations:
      ALLOWED_DOMAINS: "*.home.mburnsfire.net,github.com,gitlab.com"
      ALLOW_LOCALNETWORKS: true

    webhook:
      ALLOWED_HOST_LIST: private
      SKIP_TLS_VERIFY: true

    repository.pull-request:
      DEFAULT_MERGE_STYLE: merge

    repository.signing:
      DEFAULT_TRUST_MODEL: committer

    # Enable Gitea Actions for CI/CD
    actions:
      ENABLED: true
      DEFAULT_ACTIONS_URL: https://github.com

    # Storage configuration for artifacts
    storage:
      STORAGE_TYPE: local

    # OAuth2 configuration
    "oauth2_client":
      ENABLE_AUTO_REGISTRATION: true
      ACCOUNT_LINKING: login
      UPDATE_AVATAR: true

    # Authentik OAuth provider
    # CLIENT_ID and CLIENT_SECRET are managed via helm upgrade with a separate
    # git-ignored values file (production/values-secrets.yaml) - not stored in git
    "oauth2_client.authentik":
      PROVIDER: openidConnect
      AUTO_DISCOVER_URL: https://auth.home.mburnsfire.net/application/o/gitea/.well-known/openid-configuration
      ICON_URL: https://goauthentik.io/img/icon.png
      SCOPES: openid email profile

  # Environment variables for database and secrets
  env:
    # Database configuration
    - name: GITEA__database__DB_TYPE
      value: postgres
    - name: GITEA__database__HOST
      value: gitea-postgresql-ha-pgpool:5432
    - name: GITEA__database__NAME
      value: gitea
    - name: GITEA__database__USER
      valueFrom:
        secretKeyRef:
          name: gitea-db-app
          key: username
    - name: GITEA__database__PASSWD
      valueFrom:
        secretKeyRef:
          name: gitea-db-app
          key: password
    - name: GITEA__database__SSL_MODE
      value: disable

    # Gitea secrets
    - name: GITEA__security__INTERNAL_TOKEN
      valueFrom:
        secretKeyRef:
          name: gitea-secrets
          key: internal_token
    - name: GITEA__security__SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: gitea-secrets
          key: secret_key
    - name: GITEA__lfs__JWT_SECRET
      valueFrom:
        secretKeyRef:
          name: gitea-secrets
          key: lfs_jwt_secret
    - name: GITEA__oauth2__JWT_SECRET
      valueFrom:
        secretKeyRef:
          name: gitea-secrets
          key: oauth2_jwt_secret

    # Redis password for session/cache/queue
    - name: REDIS_PASSWORD
      valueFrom:
        secretKeyRef:
          name: gitea-redis
          key: redis-password

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 2
      memory: 2Gi

# Disable single PostgreSQL instance
postgresql:
  enabled: false

# Enable PostgreSQL HA cluster
postgresql-ha:
  enabled: true
  global:
    postgresql:
      auth:
        username: giteauser
        database: gitea
        existingSecret: gitea-pg-ha-secrets
        secretKeys:
          adminPasswordKey: postgresql-password
          userPasswordKey: password
          replicationPasswordKey: repmgr-password

  postgresql:
    # Use imagestream to avoid Docker Hub rate limits
    image:
      registry: image-registry.openshift-image-registry.svc:5000
      repository: gitea/postgresql-repmgr
      tag: 17.6.0-debian-12-r2
    replicaCount: 3
    # Spread replicas across nodes
    podAntiAffinityPreset: hard
    # OpenShift compatibility - allow SCC to assign dynamic UIDs/GIDs
    podSecurityContext:
      enabled: true
      fsGroup: null  # Let OpenShift SCC assign dynamically
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      enabled: true
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      runAsUser: null  # Let OpenShift SCC assign dynamically
      capabilities:
        drop:
          - ALL
    # Storage for each PostgreSQL instance
    persistence:
      enabled: true
      size: 20Gi
      # Use nfs-default to avoid Synology CSI permission issues
      storageClass: "nfs-default"
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2
        memory: 4Gi
    # Disable volumePermissions (fails on OpenShift restricted SCC)
    volumePermissions:
      enabled: false

  pgpool:
    # Use imagestream to avoid Docker Hub rate limits
    image:
      registry: image-registry.openshift-image-registry.svc:5000
      repository: gitea/pgpool
      tag: 4.6.3-debian-12-r0
    replicaCount: 2
    # Spread replicas across nodes
    podAntiAffinityPreset: hard
    # OpenShift compatibility
    podSecurityContext:
      enabled: false
    containerSecurityContext:
      enabled: false
    customUsersSecret: gitea-pgpool-custom-users
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1
        memory: 1Gi

# Enable Redis for session/cache/queue storage (required for HA)
redis:
  enabled: true
  # Use imagestream to avoid Docker Hub rate limits
  image:
    registry: image-registry.openshift-image-registry.svc:5000
    repository: gitea/redis
    tag: 7.2.5-debian-12-r4
  architecture: standalone
  auth:
    enabled: true
    existingSecret: gitea-redis
    existingSecretPasswordKey: redis-password
  master:
    persistence:
      enabled: true
      size: 8Gi
      storageClass: "nfs-default"
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    # OpenShift compatibility
    podSecurityContext:
      enabled: false
    containerSecurityContext:
      enabled: false

# Disable redis-cluster (using standalone redis instead)
redis-cluster:
  enabled: false
