---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: gitea
  namespace: gitea
  annotations:
    description: "Gitea container image stream with automatic updates"
spec:
  # lookupPolicy.local intentionally omitted (defaults to false): a node-cached image
  # locally tagged as this stream must NOT be resolvable as prod by name. That masquerade
  # caused the 2026-07 stale-image incident. The Deployment references a full digest ref.
  tags:
    # Track stable (1.26.x) rootless releases
    # Note: Tag is "stable-rootless" to match what Helm chart generates (tag "stable" + rootless: true)
    - name: "stable-rootless"
      annotations:
        openshift.io/display-name: "Gitea Stable Rootless"
        description: "Gitea stable (1.26.x) rootless releases"
      from:
        kind: DockerImage
        name: docker.io/gitea/gitea:1.26-rootless
      importPolicy:
        # Automatically import new images on schedule (checks every ~15 minutes)
        scheduled: true
        # PreserveOriginal keeps the full manifest list, so the internal registry stores
        # it under the manifest-list digest that Renovate pins in values.yaml.
        # (Legacy stored the amd64-only sub-digest, which never matched Renovate's pin.)
        importMode: PreserveOriginal
      referencePolicy:
        type: Local

    # Track latest rootless releases (for staging)
    - name: "latest-rootless"
      annotations:
        openshift.io/display-name: "Gitea Latest Rootless"
        description: "Latest Gitea rootless release"
      from:
        kind: DockerImage
        name: docker.io/gitea/gitea:latest-rootless
      importPolicy:
        scheduled: true
        importMode: Legacy
      referencePolicy:
        type: Local
