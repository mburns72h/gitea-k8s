APP_NAME = Gitea: Git with a cup of tea
RUN_MODE = prod

[server]
DISABLE_SSH = false
SSH_DOMAIN = gitea-ssh.home.mburnsfire.net
SSH_PORT = 2222
SSH_LISTEN_PORT = 2222
ROOT_URL = https://gitea.home.mburnsfire.net/
LFS_START_SERVER = true
OFFLINE_MODE = false

[database]
DB_TYPE = postgres
HOST = gitea-postgresql-ha-pgpool:5432
NAME = gitea
USER = giteauser
SSL_MODE = disable

[session]
PROVIDER = redis
PROVIDER_CONFIG = redis+cluster://:@gitea-valkey-cluster-headless.gitea.svc.cluster.local:6379/0?pool_size=100&idle_timeout=180s&
COOKIE_SECURE = true
COOKIE_NAME = gitea_session

[cache]
ENABLED = true
ADAPTER = redis
HOST = redis+cluster://:@gitea-valkey-cluster-headless.gitea.svc.cluster.local:6379/0?pool_size=100&idle_timeout=180s&

[queue]
TYPE = redis
CONN_STR = redis+cluster://:@gitea-valkey-cluster-headless.gitea.svc.cluster.local:6379/0?pool_size=100&idle_timeout=180s&

[security]
INSTALL_LOCK = true
REVERSE_PROXY_LIMIT = 1
REVERSE_PROXY_TRUSTED_PROXIES = *
PASSWORD_HASH_ALGO = pbkdf2

[service]
DISABLE_REGISTRATION = false
REQUIRE_SIGNIN_VIEW = false
REGISTER_EMAIL_CONFIRM = false
ENABLE_NOTIFY_MAIL = true
DEFAULT_KEEP_EMAIL_PRIVATE = false
DEFAULT_ALLOW_CREATE_ORGANIZATION = true
DEFAULT_ENABLE_TIMETRACKING = true

[mailer]
ENABLED = true
SMTP_ADDR = smtp-relay.smtp-relay.svc.cluster.local
SMTP_PORT = 25
PROTOCOL = smtp
FROM = Gitea <mburns72h+gitea@gmail.com>

[openid]
ENABLE_OPENID_SIGNIN = false
ENABLE_OPENID_SIGNUP = false

[migrations]
ALLOWED_DOMAINS = *.home.mburnsfire.net
ALLOW_LOCALNETWORKS = true

[webhook]
ALLOWED_HOST_LIST = private
SKIP_TLS_VERIFY = true

[repository.pull-request]
DEFAULT_MERGE_STYLE = merge

[repository.signing]
DEFAULT_TRUST_MODEL = committer

[actions]
ENABLED = true
DEFAULT_ACTIONS_URL = https://github.com

[storage]
STORAGE_TYPE = local

[oauth2_client]
ENABLE_AUTO_REGISTRATION = true
ACCOUNT_LINKING = login
UPDATE_AVATAR = true

