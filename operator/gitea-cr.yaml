apiVersion: pfe.rhpds.com/v1
kind: Gitea
metadata:
  name: gitea-prod
  namespace: gitea
spec:
  # Use external PostgreSQL HA cluster
  postgresqlSetup: false
  giteaPostgresqlServiceName: gitea-postgresql-ha-pgpool
  giteaPostgresqlDatabaseName: gitea
  giteaPostgresqlUser: gitea
  giteaPostgresqlPassword: "gitea"

  # Gitea image and version
  giteaImageTag: 1.25.4

  # Storage configuration
  giteaVolumeSize: 50Gi
  giteaVolumeStorageClass: nfs-default

  # SSL/TLS routing
  giteaSsl: true
  giteaHostname: gitea.home.mburnsfire.net

  # Admin user configuration (existing user, password should match)
  giteaAdminUser: gitea_admin
  giteaAdminEmail: mburns72h+gitea@gmail.com
  giteaAdminPassword: "r8sA8CPHD9!bt6d"
  giteaAdminPasswordLength: 16

  # Custom app.ini configuration
  giteaConfigMapName: gitea-app-config
