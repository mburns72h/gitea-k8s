---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitea-prod
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/component: argocd-application
    app.kubernetes.io/part-of: gitea
    environment: production
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  sources:
    - repoURL: https://dl.gitea.com/charts/
      chart: gitea
      targetRevision: 12.5.0
      helm:
        releaseName: gitea
        valueFiles:
          - $values/production/values.yaml

    - repoURL: https://gitea.home.mburnsfire.net/homelab/gitea-k8s.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: gitea

  # MANUAL SYNC ONLY - no automated changes to production
  syncPolicy:
    syncOptions:
      - CreateNamespace=false
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/replicas
    - group: ""
      kind: Secret
      name: gitea
      namespace: gitea
      jsonPointers:
        - /data/config_environment.sh
