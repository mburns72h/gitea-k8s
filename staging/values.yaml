image:
  registry: image-registry.openshift-image-registry.svc:5000
  repository: gitea-staging/gitea
  tag: "latest-rootless"
  pullPolicy: IfNotPresent
  rootless: false  # tag already includes -rootless suffix

replicaCount: 1

strategy:
  type: "Recreate"

service:
  http:
    type: ClusterIP
    port: 3000
  ssh:
    enabled: true
    type: NodePort
    port: 2222
    nodePort: 32223

ingress:
  enabled: false

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
  fsGroup: null
  runAsUser: null
  runAsGroup: null

containerSecurityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: null
  runAsGroup: null
  capabilities:
    drop:
      - ALL

initContainerSecurityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: null
  runAsGroup: null
  capabilities:
    drop:
      - ALL

persistence:
  enabled: true
  accessModes:
    - ReadWriteMany
  size: 10Gi
  storageClass: "nfs-default"
  mountPath: /data

gitea:
  admin:
    username: "gitea_admin"
    email: "mburns72h+gitea-staging@gmail.com"
    existingSecret: "gitea-staging-admin"

  initPreScript: |
    #!/bin/sh
    mkdir -p /data/git/.ssh || true
    chmod 700 /data/git/.ssh || true
    mkdir -p /data/gitea/conf || true
    mkdir -p "${GITEA_TEMP}" || true
    chmod ug+rwx "${GITEA_TEMP}" || true
    exit 0

  livenessProbe:
    enabled: true
    initialDelaySeconds: 200
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 10

  readinessProbe:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 3

  config:
    APP_NAME: "Gitea Staging"
    RUN_MODE: prod

    server:
      DISABLE_SSH: false
      SSH_DOMAIN: gitea-ssh-staging.home.mburnsfire.net
      SSH_PORT: 2222
      SSH_LISTEN_PORT: 2222
      ROOT_URL: https://gitea-staging.home.mburnsfire.net/
      LFS_START_SERVER: true
      OFFLINE_MODE: false

    database:
      DB_TYPE: postgres

    session:
      PROVIDER: redis
      COOKIE_SECURE: true
      COOKIE_NAME: gitea_staging_session

    cache:
      ENABLED: true
      ADAPTER: redis

    queue:
      TYPE: redis

    security:
      INSTALL_LOCK: true
      REVERSE_PROXY_LIMIT: 1
      REVERSE_PROXY_TRUSTED_PROXIES: "*"
      PASSWORD_HASH_ALGO: pbkdf2

    service:
      DISABLE_REGISTRATION: true
      REQUIRE_SIGNIN_VIEW: true
      REGISTER_EMAIL_CONFIRM: false
      ENABLE_NOTIFY_MAIL: true
      DEFAULT_ALLOW_CREATE_ORGANIZATION: true
      DEFAULT_ENABLE_TIMETRACKING: true

    mailer:
      ENABLED: true
      SMTP_ADDR: smtp-relay.smtp-relay.svc.cluster.local
      SMTP_PORT: 25
      PROTOCOL: smtp
      FROM: "Gitea Staging <mburns72h+gitea-staging@gmail.com>"

    openid:
      ENABLE_OPENID_SIGNIN: false
      ENABLE_OPENID_SIGNUP: false

    migrations:
      ALLOWED_DOMAINS: "*.home.mburnsfire.net"
      ALLOW_LOCALNETWORKS: true

    webhook:
      ALLOWED_HOST_LIST: private
      SKIP_TLS_VERIFY: true

    actions:
      ENABLED: true
      DEFAULT_ACTIONS_URL: https://github.com

    storage:
      STORAGE_TYPE: local

    "oauth2_client":
      ENABLE_AUTO_REGISTRATION: true
      ACCOUNT_LINKING: login
      UPDATE_AVATAR: true

  env:
    - name: USER_UID
      value: "auto"
    - name: USER_GID
      value: "auto"
    - name: GITEA_SKIP_CHOWN
      value: "true"

    # Database
    - name: GITEA__database__HOST
      value: gitea-staging-postgresql:5432
    - name: GITEA__database__NAME
      valueFrom:
        secretKeyRef:
          name: gitea-staging-postgresql
          key: database
    - name: GITEA__database__USER
      valueFrom:
        secretKeyRef:
          name: gitea-staging-postgresql
          key: username
    - name: GITEA__database__PASSWD
      valueFrom:
        secretKeyRef:
          name: gitea-staging-postgresql
          key: password
    - name: GITEA__database__SSL_MODE
      value: disable

    # Gitea internal secrets
    - name: GITEA__security__INTERNAL_TOKEN
      valueFrom:
        secretKeyRef:
          name: gitea-staging-secrets
          key: internal_token
    - name: GITEA__security__SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: gitea-staging-secrets
          key: secret_key
    - name: GITEA__lfs__JWT_SECRET
      valueFrom:
        secretKeyRef:
          name: gitea-staging-secrets
          key: lfs_jwt_secret
    - name: GITEA__oauth2__JWT_SECRET
      valueFrom:
        secretKeyRef:
          name: gitea-staging-secrets
          key: oauth2_jwt_secret

    # Redis connection (full URL with password injected at runtime)
    - name: GITEA__session__PROVIDER_CONFIG
      valueFrom:
        secretKeyRef:
          name: gitea-staging-secrets
          key: redis_session_url
    - name: GITEA__cache__HOST
      valueFrom:
        secretKeyRef:
          name: gitea-staging-secrets
          key: redis_cache_url
    - name: GITEA__queue__CONN_STR
      valueFrom:
        secretKeyRef:
          name: gitea-staging-secrets
          key: redis_queue_url

    # Authentik OAuth2
    - name: GITEA__oauth2_client.authentik__CLIENT_ID
      valueFrom:
        secretKeyRef:
          name: gitea-staging-secrets
          key: authentik_client_id
    - name: GITEA__oauth2_client.authentik__CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: gitea-staging-secrets
          key: authentik_client_secret
    - name: GITEA__oauth2_client.authentik__AUTO_DISCOVER_URL
      value: "https://auth-stage.home.mburnsfire.net/application/o/gitea-staging/.well-known/openid-configuration"
    - name: GITEA__oauth2_client.authentik__PROVIDER
      value: "openidConnect"
    - name: GITEA__oauth2_client.authentik__ICON_URL
      value: "https://goauthentik.io/img/icon.png"
    - name: GITEA__oauth2_client.authentik__SCOPES
      value: "openid email profile"

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 2
      memory: 2Gi

postgresql:
  enabled: true
  auth:
    username: gitea
    database: gitea
    existingSecret: gitea-staging-postgresql
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: password
  primary:
    persistence:
      enabled: true
      size: 10Gi
      storageClass: "nfs-default"
    podSecurityContext:
      enabled: false
    containerSecurityContext:
      enabled: false

postgresql-ha:
  enabled: false

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: true
    existingSecret: gitea-staging-secrets
    existingSecretPasswordKey: redis_password
  image:
    registry: image-registry.openshift-image-registry.svc:5000
    repository: gitea-staging/redis
    tag: "7"
  master:
    persistence:
      enabled: true
      size: 2Gi
      storageClass: "nfs-default"
    podSecurityContext:
      enabled: false
    containerSecurityContext:
      enabled: false

redis-cluster:
  enabled: false

valkey-cluster:
  enabled: false
