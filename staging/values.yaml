image:
  registry: image-registry.openshift-image-registry.svc:5000
  repository: gitea-stage/gitea
  tag: "latest"
  pullPolicy: Always
  rootless: true

replicaCount: 1

strategy:
  type: "Recreate"

# OpenShift compatibility — chart applies restricted SCC defaults automatically
openshift:
  enabled: true

serviceAccount:
  create: true
  name: gitea-stage

service:
  http:
    type: ClusterIP
    port: 3000
  ssh:
    enabled: true
    type: NodePort
    port: 2222
    nodePort: 32223

ingress:
  enabled: false

persistence:
  enabled: true
  accessModes:
    - ReadWriteMany
  size: 10Gi
  storageClass: "nfs-default"
  mountPath: /data

gitea:
  oauth:
    - name: authentik
      provider: openidConnect
      existingSecret: gitea-stage-secrets
      autoDiscoverUrl: https://auth-stage.home.mburnsfire.net/application/o/gitea/.well-known/openid-configuration
      iconUrl: https://goauthentik.io/img/icon.png
      scopes: openid email profile

  admin:
    username: "gitea_admin"
    email: "mburns72h+gitea-stage@gmail.com"
    existingSecret: "gitea-stage-admin"

  livenessProbe:
    enabled: true
    initialDelaySeconds: 200
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 10

  readinessProbe:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 3

  # Note: The initPreScript cannot patch config_environment.sh because it runs
  # in configure-gitea AFTER init-app-ini. The fix is applied by patching the
  # gitea-stage Secret's config_environment.sh key directly, with ignoreDifferences
  # protecting it from selfHeal. The correct gitea 1.26 command is:
  # gitea config edit-ini --apply-env --out $GITEA_APP_INI

  config:
    APP_NAME: "Gitea Stage"
    RUN_MODE: prod

    server:
      DISABLE_SSH: false
      START_SSH_SERVER: true
      SSH_DOMAIN: gitea-ssh-stage.home.mburnsfire.net
      SSH_PORT: 2222
      SSH_LISTEN_PORT: 2222
      ROOT_URL: https://gitea-stage.home.mburnsfire.net/
      LFS_START_SERVER: true
      OFFLINE_MODE: false

    database:
      DB_TYPE: postgres

    session:
      PROVIDER: redis
      COOKIE_SECURE: true
      COOKIE_NAME: gitea_stage_session

    cache:
      ENABLED: true
      ADAPTER: redis

    queue:
      TYPE: redis

    security:
      INSTALL_LOCK: true
      REVERSE_PROXY_LIMIT: 1
      REVERSE_PROXY_TRUSTED_PROXIES: "*"
      PASSWORD_HASH_ALGO: pbkdf2

    service:
      DISABLE_REGISTRATION: true
      REQUIRE_SIGNIN_VIEW: true
      REGISTER_EMAIL_CONFIRM: false
      ENABLE_NOTIFY_MAIL: true
      DEFAULT_ALLOW_CREATE_ORGANIZATION: true
      DEFAULT_ENABLE_TIMETRACKING: true

    mailer:
      ENABLED: true
      SMTP_ADDR: smtp-relay.smtp-relay.svc.cluster.local
      SMTP_PORT: 25
      PROTOCOL: smtp
      FROM: "Gitea Stage <mburns72h+gitea-stage@gmail.com>"

    openid:
      ENABLE_OPENID_SIGNIN: false
      ENABLE_OPENID_SIGNUP: false

    migrations:
      ALLOWED_DOMAINS: "*.home.mburnsfire.net"
      ALLOW_LOCALNETWORKS: true

    webhook:
      ALLOWED_HOST_LIST: private
      SKIP_TLS_VERIFY: true

    actions:
      ENABLED: true
      DEFAULT_ACTIONS_URL: https://github.com

    storage:
      STORAGE_TYPE: local

    "oauth2_client":
      ENABLE_AUTO_REGISTRATION: true
      ACCOUNT_LINKING: login
      UPDATE_AVATAR: true

    # Authentik stage OAuth provider
    # CLIENT_ID and CLIENT_SECRET are in git-ignored staging/values-secrets.yaml
    "oauth2_client.authentik":
      PROVIDER: openidConnect
      AUTO_DISCOVER_URL: https://auth-stage.home.mburnsfire.net/application/o/gitea/.well-known/openid-configuration
      ICON_URL: https://goauthentik.io/img/icon.png
      SCOPES: openid email profile

deployment:
  env:
    # Database
    - name: GITEA__database__HOST
      value: gitea-stage-postgresql:5432
    - name: GITEA__database__NAME
      valueFrom:
        secretKeyRef:
          name: gitea-stage-postgresql
          key: database
    - name: GITEA__database__USER
      valueFrom:
        secretKeyRef:
          name: gitea-stage-postgresql
          key: username
    - name: GITEA__database__PASSWD
      valueFrom:
        secretKeyRef:
          name: gitea-stage-postgresql
          key: password
    - name: GITEA__database__SSL_MODE
      value: disable

    # Gitea internal secrets
    - name: GITEA__security__INTERNAL_TOKEN
      valueFrom:
        secretKeyRef:
          name: gitea-stage-secrets
          key: internal_token
    - name: GITEA__security__SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: gitea-stage-secrets
          key: secret_key
    - name: GITEA__lfs__JWT_SECRET
      valueFrom:
        secretKeyRef:
          name: gitea-stage-secrets
          key: lfs_jwt_secret
    - name: GITEA__oauth2__JWT_SECRET
      valueFrom:
        secretKeyRef:
          name: gitea-stage-secrets
          key: oauth2_jwt_secret

    # Redis connection
    - name: GITEA__session__PROVIDER_CONFIG
      valueFrom:
        secretKeyRef:
          name: gitea-stage-secrets
          key: redis_session_url
    - name: GITEA__cache__HOST
      valueFrom:
        secretKeyRef:
          name: gitea-stage-secrets
          key: redis_cache_url
    - name: GITEA__queue__CONN_STR
      valueFrom:
        secretKeyRef:
          name: gitea-stage-secrets
          key: redis_queue_url

    # Authentik OAuth credentials (CLIENT_ID and CLIENT_SECRET)
    # These come from the values-secrets.yaml file applied separately

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 2
      memory: 2Gi

postgresql:
  enabled: true
  auth:
    username: gitea
    database: gitea
    existingSecret: gitea-stage-postgresql
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: password
  primary:
    persistence:
      enabled: true
      size: 10Gi
      storageClass: "nfs-default"
    podSecurityContext:
      enabled: false
    containerSecurityContext:
      enabled: false

postgresql-ha:
  enabled: false

valkey:
  enabled: true
  architecture: standalone
  auth:
    enabled: true
    existingSecret: gitea-stage-secrets
    existingSecretPasswordKey: redis_password
  primary:
    persistence:
      enabled: true
      size: 2Gi
      storageClass: "nfs-default"
    podSecurityContext:
      enabled: false
    containerSecurityContext:
      enabled: false

redis-cluster:
  enabled: false

valkey-cluster:
  enabled: false
