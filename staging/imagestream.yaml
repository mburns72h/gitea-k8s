---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: gitea
  namespace: gitea-stage
  labels:
    app: gitea-stage
spec:
  # lookupPolicy.local intentionally omitted (defaults to false): prevents node-cached
  # images from masquerading as this stream by name. referencePolicy.type: Local below
  # is sufficient to direct pod pulls through the internal registry.
  tags:
    - name: "latest-rootless"
      from:
        kind: DockerImage
        name: docker.io/gitea/gitea:latest-rootless
      importPolicy:
        scheduled: true
        # PreserveOriginal stores the manifest-list digest, matching what Renovate
        # pins in staging/values.yaml digest: field.
        importMode: PreserveOriginal
      referencePolicy:
        type: Local
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: postgresql
  namespace: gitea-stage
  labels:
    app: gitea-stage
spec:
  lookupPolicy:
    local: true
  tags:
    - name: "17.6.0-debian-12-r4"
      from:
        kind: DockerImage
        name: docker.io/bitnamilegacy/postgresql:17.6.0-debian-12-r4
      importPolicy:
        scheduled: true
        importMode: Legacy
      referencePolicy:
        type: Local
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: valkey
  namespace: gitea-stage
  labels:
    app: gitea-stage
spec:
  lookupPolicy:
    local: true
  tags:
    - name: "8.1.3-debian-12-r3"
      from:
        kind: DockerImage
        name: docker.io/bitnamilegacy/valkey:8.1.3-debian-12-r3
      importPolicy:
        scheduled: true
        importMode: Legacy
      referencePolicy:
        type: Local
