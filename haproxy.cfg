global
    # Log to a syslog server (optional, but recommended)
    log         127.0.0.1 local2

    # Standard settings for HAProxy
    chroot      /var/lib/haproxy
    pidfile     /var/run/haproxy.pid
    maxconn     4000
    user        haproxy
    group       haproxy
    daemon

    # Increase this for troubleshooting or status
    stats socket /var/lib/haproxy/stats mode 660 level admin

defaults
    log                     global
    mode                    tcp             # Use TCP for all traffic (API and Ingress)
    option                  tcplog
    option                  dontlognull
    # Configure timeouts for various connection states
    timeout connect         5s
    timeout client          10m             # Long timeout for client to keep API connections open
    timeout server          10m             # Long timeout for server to keep API connections open
    retries                 3
    balance                 leastconn       # Least connections is a good, simple balance method

# ----------------------------------------------------------------------------------
# 1. OpenShift / Kubernetes API Server (VIP:6443 -> Masters:6443)
# ----------------------------------------------------------------------------------
frontend api-server
    bind 192.168.0.12:6443
    default_backend api-server-backend
    
backend api-server-backend
    # Health checks the API server port on all Masters
    server r640-1 192.168.1.110:6443 check
    server r640-2 192.168.0.132:6443 check
    server r640-3 192.168.1.40:6443 check

# ----------------------------------------------------------------------------------
# 2. OpenShift Machine Config Server / Bootstrap (VIP:22623 -> Masters:22623)
#    NOTE: The Bootstrap node must be included here *only* during the install phase.
#    You must remove it after the bootstrap is complete.
# ----------------------------------------------------------------------------------
frontend machine-config-server
    bind 192.168.0.12:22623
    default_backend mcs-backend

backend mcs-backend
    # Health checks the Machine Config Server port on all Masters (and Bootstrap)
    server r640-1 192.168.1.110:22623 check
    server r640-2 192.168.0.132:22623 check
    server r640-3 192.168.1.40:22623 check

# ----------------------------------------------------------------------------------
# 3. OpenShift Ingress (Application Traffic) (VIP:80/443 -> Ingress Nodes:80/443)
#    (These backend nodes are typically your Worker nodes)
# ----------------------------------------------------------------------------------
frontend ingress-http
    bind 192.168.0.13:80
    default_backend ingress-http-backend

frontend ingress-https
    bind 192.168.0.13:443
    default_backend ingress-https-backend

backend ingress-http-backend
    # Health checks the Ingress Controller port on Worker/Infra nodes
    # Replace <workerX_IP> with the IP of your nodes running the router/ingress
    server r640-1 192.168.1.110:80 check
    server r640-2 192.168.0.132:80 check
    server r640-3 192.168.1.40:80 check

backend ingress-https-backend
    # Health checks the Ingress Controller port on Worker/Infra nodes
    server r640-1 192.168.1.110:443 check
    server r640-2 192.168.0.132:443 check
    server r640-3 192.168.1.40:443 check

# ----------------------------------------------------------------------------------
# 4. SMTP Relay (VIP:25 -> OpenShift Nodes:<NodePort>)
# ----------------------------------------------------------------------------------
frontend smtp-relay
    # Listen on the Ingress VIP on port 25
    bind 192.168.0.13:25 
    mode tcp
    default_backend bk_smtp_relay

backend bk_smtp_relay
    mode tcp
    balance leastconn
    # Forward to the OpenShift Nodes using the NodePort you found (e.g., 30025)
    server r640-1 192.168.1.110:31277 check
    server r640-2 192.168.0.132:31277 check
    server r640-3 192.168.1.40:31277 check
    # Add all other nodes running the router here

